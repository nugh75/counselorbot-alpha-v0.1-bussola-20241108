<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counselorbot - Widget</title>
<style>
:root{--base-font-size:14px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:Arial,sans-serif;font-size:var(--base-font-size);background:transparent;color:#333}
.chat-widget{position:fixed;bottom:20px;right:20px;background:#39b3e6;height:50px;padding:0 20px;border-radius:30px;box-shadow:0 2px 12px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9999;transition:transform .2s;gap:10px}
.chat-widget:hover{transform:scale(1.05)}
.chat-widget-icon{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.widget-text{color:#fff;font-size:.85rem;font-weight:700;white-space:nowrap}
.chat-container{position:fixed;bottom:90px;right:20px;width:380px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;flex-direction:column;border-radius:12px;max-height:80vh;overflow:hidden;visibility:hidden;opacity:0;transition:opacity .25s,visibility .25s;z-index:9999}
.chat-container.open{visibility:visible;opacity:1}
.hidden{display:none!important}
.chat-header{background:#39b3e6;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.chat-title{font-size:1rem;color:#fff;font-weight:700}
.close-btn{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.chat-messages{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:200px}
.message{display:inline-block;padding:8px 14px;border-radius:16px;line-height:1.4;max-width:85%;word-wrap:break-word;white-space:pre-wrap}
.message.bot{background:#39b3e6;color:#fff;align-self:flex-start;border-bottom-left-radius:4px}
.message.user{background:#daf8e3;color:#333;align-self:flex-end;border-bottom-right-radius:4px}
.context-wrapper{background:#f9f9f9;border-left:3px solid #39b3e6;padding:10px;border-radius:5px;margin:8px 0;font-size:.85rem}
.context-title{font-weight:700;margin-bottom:4px}
.context-details{margin-bottom:6px}
.context-details summary{cursor:pointer;color:#39b3e6}
.context-details pre{background:#eee;padding:6px;border-radius:4px;margin-top:4px;font-size:.8rem;white-space:pre-wrap;max-height:150px;overflow-y:auto}
.initial-questions{padding:16px;background:#f9f9f9;border-radius:8px;margin:12px}
.initial-questions h3{font-size:.95rem;margin-bottom:12px;color:#333}
.initial-questions label{display:block;font-size:.85rem;margin-bottom:4px}
.initial-questions input,.initial-questions select{width:100%;padding:8px;margin-bottom:8px;border:1px solid #ccc;border-radius:6px;font-size:.85rem}
.initial-questions button{background:#39b3e6;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.85rem}
.chat-input-area{border-top:1px solid #eee;padding:10px;background:#fff}
.input-wrapper{display:flex;align-items:center;background:#fff;border:1px solid #ddd;border-radius:24px;padding:4px 12px}
#user-input{flex:1;border:none;outline:none;font-size:.9rem;resize:none;padding:6px 0;background:transparent}
#send-button{background:none;border:none;cursor:pointer;padding:6px;border-radius:50%;color:#39b3e6}
#send-button:hover{background:#e8f4fc}
.chat-footer{text-align:center;font-size:.7rem;color:#888;padding:8px;border-top:1px solid #eee;background:#fff}
.chat-footer a{color:#39b3e6;text-decoration:none}
</style>
</head>
<body>

<div class="chat-widget" id="chat-widget">
  <div class="chat-widget-icon">💬</div>
  <span class="widget-text">Counselorbot</span>
</div>

<div class="chat-container" id="chat-container">
  <div class="chat-header">
    <span class="chat-title">Counselorbot</span>
    <button class="close-btn" id="close-chat">✕</button>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-area">
    <div id="initial-questions" class="initial-questions">
      <h3>Parlami un po' di te</h3>
      <div><label>Nome:</label><input type="text" id="user-name" placeholder="Il tuo nome"></div>
      <div><label>Età:</label><input type="number" id="user-age" placeholder="La tua età"></div>
      <div><label>Ruolo:</label>
        <select id="user-role"><option value="studente">Studente</option><option value="docente">Docente</option><option value="genitore">Genitore</option></select>
      </div>
      <button id="submit-info">Invia</button>
    </div>

    <div id="chat-input-wrapper" class="input-wrapper hidden">
      <textarea id="user-input" placeholder="Scrivi qui..." rows="1"></textarea>
      <button id="send-button" aria-label="Invia"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>

  <div class="chat-footer">
    Il chatbot può commettere errori. <a href="#" id="open-full">Versione completa</a>
  </div>
</div>

<script src="/static/marked.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const $ = id => document.getElementById(id)
  const chatWidget = $('chat-widget')
  const chatContainer = $('chat-container')
  const closeChat = $('close-chat')
  const chatMessages = $('chat-messages')
  const userInput = $('user-input')
  const sendButton = $('send-button')
  const initialQuestions = $('initial-questions')
  const chatInputWrapper = $('chat-input-wrapper')
  const submitInfo = $('submit-info')

  let messageHistory = []

  try {
    const r = await fetch('/static/instructions.txt')
    const text = await r.text()
    messageHistory = [{ role: 'system', content: text }]
  } catch (_) {
    messageHistory = [{ role: 'system', content: 'Sei un tutor orientatore.' }]
  }

  chatWidget.addEventListener('click', () => chatContainer.classList.add('open'))
  closeChat.addEventListener('click', () => chatContainer.classList.remove('open'))

  function addMessage(text, sender) {
    const div = document.createElement('div')
    div.className = 'message ' + sender
    div.innerHTML = marked.parse(text)
    chatMessages.appendChild(div)
    chatMessages.scrollTop = chatMessages.scrollHeight
  }

  function setInputState(disabled) {
    userInput.disabled = disabled
    sendButton.disabled = disabled
  }

  addMessage('Benvenuto! Sono il tuo tutor orientatore. Come posso aiutarti?', 'bot')

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto'
    userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px'
  })

  submitInfo.addEventListener('click', () => {
    const name = $('user-name').value.trim()
    const age = $('user-age').value.trim()
    const role = $('user-role').value
    if (name && age) {
      messageHistory[0].content += `\nUtente: Nome=${name}, Età=${age}, Ruolo=${role}`
      addMessage(`Grazie, ${name}. Ora possiamo iniziare!`, 'bot')
      initialQuestions.classList.add('hidden')
      chatInputWrapper.classList.remove('hidden')
    } else {
      addMessage('Per favore, inserisci nome ed età.', 'bot')
    }
  })

  async function sendMessage() {
    const msg = userInput.value.trim()
    if (!msg) return
    try {
      setInputState(true)
      addMessage(msg, 'user')
      messageHistory.push({ role: 'user', content: msg })
      userInput.value = ''
      userInput.style.height = 'auto'

      const r = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ messages: messageHistory, temperature: 0.7 })
      })
      if (!r.ok) throw new Error('Errore ' + r.status)
      const data = await r.json()
      addMessage(data.llm_response, 'bot')
      if (data.context_chunks?.length) {
        const wrapper = document.createElement('div')
        wrapper.className = 'context-wrapper'
        wrapper.innerHTML = '<div class="context-title">Fonti utilizzate:</div>'
        data.context_chunks.forEach((c, i) => {
          const details = document.createElement('details')
          details.className = 'context-details'
          details.innerHTML = `<summary>Fonte ${i+1}: ${c.source.filename} (pag.${c.source.page_number})</summary><pre>${c.content.substring(0,300)}</pre>`
          wrapper.appendChild(details)
        })
        chatMessages.appendChild(wrapper)
        chatMessages.scrollTop = chatMessages.scrollHeight
      }
      messageHistory.push({ role: 'assistant', content: data.llm_response })
    } catch (e) {
      addMessage(e.message.includes('Failed') ? 'Server non raggiungibile.' : 'Errore: ' + e.message, 'bot')
    } finally { setInputState(false) }
  }

  sendButton.addEventListener('click', sendMessage)
  userInput.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })

  $('open-full').addEventListener('click', e => { e.preventDefault(); window.open('/', '_blank') })
})
</script>
</body>
</html>
