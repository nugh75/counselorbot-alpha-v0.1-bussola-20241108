version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./.env:/app/.env
      - db_data:/app/db
      - uploads_data:/app/uploads
      - huggingface_cache:/app/huggingface_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db_data:
  uploads_data:
  huggingface_cache:
